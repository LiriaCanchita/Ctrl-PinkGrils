<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="CSS/styles.css">

</head>

<body>

    <!--?ESTE NAVBAR SERA POR MIENTRAS, LO PUEDEN CAMBIAR, PERO ASEGURENSE QUE TENGA TODOS LOS LINKS-->

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">Diners</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="perfil.html">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vacantes.html">Vacantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="resgistro.html">Resgistrarse</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!--?ESTE FOMULARIO SERA POR MIENTRAS, LO PUEDEN CAMBIAR, PERO ASEGURENSE QUE TENGA TODOS LOS APARTADOS ID VALUE-->

    <form id="form-perfil">
        <!--! NOMBRE -->
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" placeholder="Marta Mendoza">
        </div>
        <!--! AREA -->
        <div class="mb-3">
            <label for="area" class="form-label">Areas de interes</label>
            <select class="form-select" id="area">
                <option value="">Selecciona una opción</option>
                <option value="Tecnología">Tecnología</option>
                <option value="Comercial">Comercial</option>
                <option value="Marketing">Marketing</option>
                <option value="Finanzas">Finanzas</option>
                <option value="Servicio al cliente">Servicio al cliente</option>
                <option value="Recursos humanos">Recursos humanos</option>
            </select>
        </div>
        <!--! HABILIDADES -->
        <div class="mb-4">
            <label class="form-label">Habilidades</label>
            <div class="row">
                <div class="col-6 col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="JavaScript" name="habilidad" id="h1">
                        <label class="form-check-label" for="h1">JavaScript</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="SQL" name="habilidad" id="h2">
                        <label class="form-check-label" for="h2">SQL</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Excel" name="habilidad" id="h3">
                        <label class="form-check-label" for="h3">Excel</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Ventas" name="habilidad" id="h4">
                        <label class="form-check-label" for="h4">Ventas</label>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Comunicación" name="habilidad" id="h5">
                        <label class="form-check-label" for="h5">Comunicación</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Negociación" name="habilidad" id="h6">
                        <label class="form-check-label" for="h6">Negociación</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Redes sociales" name="habilidad" id="h7">
                        <label class="form-check-label" for="h7">Redes sociales</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Canva" name="habilidad" id="h8">
                        <label class="form-check-label" for="h8">Canva</label>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Análisis de datos" name="habilidad"
                            id="h9">
                        <label class="form-check-label" for="h9">Análisis de datos</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Finanzas" name="habilidad" id="h10">
                        <label class="form-check-label" for="h10">Finanzas</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Empatía" name="habilidad" id="h11">
                        <label class="form-check-label" for="h11">Empatía</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="Reclutamiento" name="habilidad" id="h12">
                        <label class="form-check-label" for="h12">Reclutamiento</label>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Enviar</button>
    </form>

    <script src="JS/matching.js"></script>
    <script src="JS/perfil.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
